services:
  postgres:
    image: postgres:16-alpine
    container_name: ecm-postgres
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: ecm
      POSTGRES_PASSWORD: ecm
      POSTGRES_DB: ecm_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecm -d ecm_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  api-bootstrap:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ecm-api-bootstrap
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ecm:ecm@postgres:5432/ecm_dev
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ECM_DEMO_ADMIN_EMAIL: ${ECM_DEMO_ADMIN_EMAIL:-admin@ecm.local}
      ECM_DEMO_ADMIN_PASSWORD: ${ECM_DEMO_ADMIN_PASSWORD:-LocalDemo123!}
      ECM_RESET_DEMO_DATA: ${ECM_RESET_DEMO_DATA:-false}
    command: ['sh', '-c', 'pnpm exec prisma migrate deploy && pnpm exec prisma db seed']

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ecm-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:${API_PORT:-3000}:3000'
    depends_on:
      api-bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://ecm:ecm@postgres:5432/ecm_dev
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_PORT: 3000
      CORS_ORIGIN: http://localhost:5173

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api/v1
    container_name: ecm-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:5173:5173'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
